<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Kreavix Client Portal</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Supabase JS -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .auth-card {
            background: var(--card-bg);
            padding: 3rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            width: 100%;
            max-width: 400px;
        }

        .auth-card h2 {
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .auth-card p {
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-main);
            font-family: inherit;
        }

        /* Password Toggle Styling */
        .password-wrapper {
            position: relative;
        }
        .password-wrapper input {
            padding-right: 3rem;
        }
        .toggle-password {
            position: absolute;
            right: 0.8rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 0.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .toggle-password:hover {
            color: var(--text-main);
        }

        .auth-btn {
            width: 100%;
            margin-top: 1rem;
        }

        .auth-toggle {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .auth-toggle a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <h2 id="auth-title">Welcome Back</h2>
            <p id="auth-subtitle">Login to manage your Krevia services.</p>

            <form id="auth-form">
                <div class="form-group" id="name-group" style="display: none;">
                    <label for="full_name">Full Name</label>
                    <input type="text" id="full_name">
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" required>
                        <button type="button" class="toggle-password" id="toggle-password-btn">
                            <i data-lucide="eye" style="width: 20px; height: 20px;"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn-primary auth-btn" id="submit-btn">Login</button>
            </form>

            <div class="auth-toggle">
                <span id="toggle-text">Don't have an account?</span>
                <a href="#" id="toggle-link">Sign Up</a>
            </div>
            
            <div style="text-align: center; margin-top: 1.5rem;">
                <a href="index.html" style="font-size: 0.8rem; color: var(--text-muted); text-decoration: none;">&larr; Back to Website</a>
            </div>
        </div>
    </div>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="supabase-init.js"></script>
    <script>
        let isLogin = true;
        const authForm = document.getElementById('auth-form');
        const toggleLink = document.getElementById('toggle-link');
        const authTitle = document.getElementById('auth-title');
        const authSubtitle = document.getElementById('auth-subtitle');
        const nameGroup = document.getElementById('name-group');
        const submitBtn = document.getElementById('submit-btn');
        const toggleText = document.getElementById('toggle-text');

        // Password Toggle Logic
        const passInput = document.getElementById('password');
        const passToggleBtn = document.getElementById('toggle-password-btn');
        const passIcon = passToggleBtn.querySelector('i');

        passToggleBtn.addEventListener('click', () => {
            const type = passInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passInput.setAttribute('type', type);
            passIcon.setAttribute('data-lucide', type === 'password' ? 'eye' : 'eye-off');
            lucide.createIcons();
        });

        lucide.createIcons();

        toggleLink.addEventListener('click', (e) => {
            e.preventDefault();
            isLogin = !isLogin;
            authTitle.textContent = isLogin ? 'Welcome Back' : 'Create Account';
            authSubtitle.textContent = isLogin ? 'Login to manage your Krevia services.' : 'Join Krevia and start scaling your digital infrastructure.';
            nameGroup.style.display = isLogin ? 'none' : 'block';
            submitBtn.textContent = isLogin ? 'Login' : 'Join Krevia';
            toggleText.textContent = isLogin ? "Don't have an account?" : "Already have an account?";
            toggleLink.textContent = isLogin ? 'Sign Up' : 'Login';
        });

        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const fullName = document.getElementById('full_name').value;

            submitBtn.disabled = true;
            submitBtn.textContent = isLogin ? 'Logging in...' : 'Creating account...';

            const urlParams = new URLSearchParams(window.location.search);
            const plan = urlParams.get('plan');
            const billing = urlParams.get('billing');

            try {
                if (isLogin) {
                    const { data, error } = await supabase.auth.signInWithPassword({
                        email,
                        password,
                    });
                    if (error) throw error;
                    
                    if (plan && billing) {
                        window.location.href = `checkout.html?plan=${plan}&billing=${billing}`;
                    } else {
                        window.location.href = 'dashboard.html';
                    }
                } else {
                    const { data, error } = await supabase.auth.signUp({
                        email,
                        password,
                        options: {
                            data: {
                                full_name: fullName,
                            }
                        }
                    });
                    if (error) throw error;
                    alert('Check your email for the confirmation link!');
                }
            } catch (error) {
                alert(error.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = isLogin ? 'Login' : 'Join Krevia';
            }
        });

        // Check if already logged in - if so, redirect immediately
        checkAuth().then(session => {
            if (session) {
                const urlParams = new URLSearchParams(window.location.search);
                const plan = urlParams.get('plan');
                const billing = urlParams.get('billing');
                if (plan && billing) {
                    window.location.href = `checkout.html?plan=${plan}&billing=${billing}`;
                } else {
                    window.location.href = 'dashboard.html';
                }
            }
        });
    </script>
</body>

</html>
